<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Botas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1 class="titulo">Catálogo de Botas Los Angeles</h1>

    <div class="contenedor-productos">

        <!-- BOTAS CHOCOLATE -->
        <div class="producto">
            <img src="imagenes/Chocolate.jpg" alt="Bota Chocolate">
            <h3>Bota Chocolate</h3>
            <button onclick="mostrarDetalles('Chocolate', ['imagenes/Chocolate.jpg','imagenes/Chocolate1.jpg','imagenes/Chocolate2.jpg'], 'Tallas disponibles: 29, 29.5')">
                Ver detalles
            </button>
        </div>

        <!-- BOTAS NEGRA -->
        <div class="producto">
            <img src="imagenes/Negra.jpg" alt="Bota Negra">
            <h3>Bota Negra</h3>
            <button onclick="mostrarDetalles('Negra', ['imagenes/Negra.jpg','imagenes/Negra1.jpg','imagenes/Negra2.jpg'], 'Tallas disponibles: 25, 25.5')">
                Ver detalles
            </button>
        </div>

        <!-- BOTAS SHEDRON -->
        <div class="producto">
            <img src="imagenes/Shedron.jpg" alt="Bota Shedron">
            <h3>Bota Shedron</h3>
            <button onclick="mostrarDetalles('Shedron', ['imagenes/Shedron.jpg','imagenes/Shedron1.jpg','imagenes/Shedron2.jpg'], 'Tallas disponibles: 26, 26.5, 27, 28.5, 30.5, 31')">
                Ver detalles
            </button>
        </div>

        <!-- BOTAS TABACO -->
        <div class="producto">
            <img src="imagenes/Tabaco.jpg" alt="Bota Tabaco">
            <h3>Bota Tabaco</h3>
            <button onclick="mostrarDetalles('Tabaco', ['imagenes/Tabaco.jpg','imagenes/Tabaco1.jpg','imagenes/Tabaco2.jpg'], 'Talla disponible: 28')">
                Ver detalles
            </button>
        </div>

    </div>

    <!-- MODAL DETALLES -->
    <div id="modal" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrarModal()">&times;</span>
            <h2 id="titulo-detalle"></h2>
            <p id="descripcion-detalle"></p>

            <!-- AQUI FALTABA modal-body -->
            <div class="modal-body">
                <div id="imagenes-detalle" class="galeria"></div>
            </div>

        </div>
    </div>


<script>
function mostrarDetalles(nombre, imagenes, descripcion) {
    document.getElementById("titulo-detalle").innerText = nombre;
    document.getElementById("descripcion-detalle").innerText = descripcion;

    const contenedor = document.getElementById("imagenes-detalle");
    contenedor.innerHTML = "";

    imagenes.forEach(img => {
        let etiqueta = document.createElement("img");
        etiqueta.src = img;
        etiqueta.className = "detalle-img";
        contenedor.appendChild(etiqueta);
    });

    document.getElementById("modal").style.display = "block";
}

function cerrarModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
