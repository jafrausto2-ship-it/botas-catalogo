<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Botas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <div class="titulo-principal">Catálogo de Botas</div>

    <div class="row g-4">
        <!-- Shedron -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Shedron.jpg" class="card-img-top" alt="Bota Shedron">
                <div class="card-body">
                    <h5 class="card-title">Bota Shedron</h5>
                    <p class="card-text">Tallas disponibles: <strong>25, 25.5</strong></p>
                </div>
            </div>
        </div>

        <!-- Negra -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Negra.jpg" class="card-img-top" alt="Bota Negra">
                <div class="card-body">
                    <h5 class="card-title">Bota Negra</h5>
                    <p class="card-text">Tallas disponibles: <strong>26, 26.5, 27, 28.5, 30.5, 31</strong></p>
                </div>
            </div>
        </div>

        <!-- Tabaco -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Tabaco.jpg" class="card-img-top" alt="Bota Tabaco">
                <div class="card-body">
                    <h5 class="card-title">Bota Tabaco</h5>
                    <p class="card-text">Tallas disponibles: <strong>28</strong></p>
                </div>
            </div>
        </div>

        <!-- Chocolate -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Chocolate.jpg" class="card-img-top" alt="Bota Chocolate">
                <div class="card-body">
                    <h5 class="card-title">Bota Chocolate</h5>
                    <p class="card-text">Tallas disponibles: <strong>29, 29.5</strong></p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
