<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Botas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
    <div class="titulo-principal">Catálogo de Botas Los Angeles</div>

    <div class="row g-4">

        <!-- Shedron -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Shedron.jpg" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Shedron</h5>
                    <p>Tallas: 25, 25.5</p>
                    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalShedron">Ver detalles</button>
                </div>
            </div>
        </div>

        <!-- Negra -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Negra.jpg" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Negra</h5>
                    <p>Tallas: 26, 26.5, 27, 28.5, 30.5, 31</p>
                    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalNegra">Ver detalles</button>
                </div>
            </div>
        </div>

        <!-- Tabaco -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Tabaco.jpg" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Tabaco</h5>
                    <p>Tallas: 28</p>
                    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalTabaco">Ver detalles</button>
                </div>
            </div>
        </div>

        <!-- Chocolate -->
        <div class="col-md-3">
            <div class="card h-100">
                <img src="imagenes/Chocolate.jpg" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Chocolate</h5>
                    <p>Tallas: 29, 29.5</p>
                    <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#modalChocolate">Ver detalles</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- MODALES -->

<div class="modal fade" id="modalShedron" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Shedron</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img src="imagenes/Shedron.jpg" class="img-fluid mb-2">
        <img src="imagenes/Shedron1.jpg" class="img-fluid mb-2">
        <img src="imagenes/Shedron2.jpg" class="img-fluid">
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalNegra" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Negra</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img src="imagenes/Negra.jpg" class="img-fluid mb-2">
        <img src="imagenes/Negra1.jpg" class="img-fluid mb-2">
        <img src="imagenes/Negra2.jpg" class="img-fluid">
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalTabaco" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Tabaco</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img src="imagenes/Tabaco.jpg" class="img-fluid mb-2">
        <img src="imagenes/Tabaco1.jpg" class="img-fluid mb-2">
        <img src="imagenes/Tabaco2.jpg" class="img-fluid">
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalChocolate" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Chocolate</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img src="imagenes/Chocolate.jpg" class="img-fluid mb-2">
        <img src="imagenes/Chocolate1.jpg" class="img-fluid mb-2">
        <img src="imagenes/Chocolate2.jpg" class="img-fluid">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
